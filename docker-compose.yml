services:
    postgres:
        image: pgvector/pgvector:pg16
        environment:
            POSTGRES_DB: journalism
            POSTGRES_USER: journalism
            POSTGRES_PASSWORD: journalism_pass
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - db_net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U journalism"]
            interval: 5s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    embeddings:
        image: michaelf34/infinity:latest
        command:
            - v2
            - --model-id
            - intfloat/multilingual-e5-small
            - --model-id
            - Alibaba-NLP/gte-multilingual-reranker-base
            - --port
            - "7997"
        ports:
            - "${BIND_ADDR:-0.0.0.0}:7997:7997"
        networks:
            - db_net
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:7997/ || exit 1"]
            start_period: 90s
        volumes:
            - huggingface_cache:/app/.cache

    news-service:
        build: ./news-service
        environment:
            DATABASE_URL: postgres://journalism:journalism_pass@postgres:5432/journalism
            EMBEDDINGS_URL: http://embeddings:7997
            RAG_SERVICE_URL: http://rag-service:5005
            JWT_SECRET: ${JWT_SECRET}
            PORT: 5001
        ports:
            - "${BIND_ADDR:-0.0.0.0}:5001:5001"
        depends_on:
            postgres:
                condition: service_healthy
            embeddings:
                condition: service_healthy
        networks:
            - db_net
        restart: unless-stopped

    summarizer:
        build: ./summarizer
        environment:
            PORT: 5003
        ports:
            - "${BIND_ADDR:-0.0.0.0}:5003:5003"
        networks:
            - db_net
        restart: unless-stopped

    fact-checker:
        build: ./fact-checker
        environment:
            PORT: 5004
            GROQ_API_KEY: ${GROQ_API_KEY}
        ports:
            - "${BIND_ADDR:-0.0.0.0}:5004:5004"
        networks:
            - db_net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:5004/health'')"',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    rag-service:
        build: ./rag-service
        environment:
            PORT: 5005
            NEWS_SERVICE_URL: http://news-service:5001
            EMBEDDINGS_URL: http://embeddings:7997
            GROQ_API_KEY: ${GROQ_API_KEY}
        ports:
            - "${BIND_ADDR:-0.0.0.0}:5005:5005"
        depends_on:
            news-service:
                condition: service_started
            embeddings:
                condition: service_healthy
        networks:
            - db_net
        restart: unless-stopped

    scraper:
        build: ./scraper
        environment:
            PORT: 5002
            NEWS_SERVICE_URL: http://news-service:5001
            SUMMARIZER_URL: http://summarizer:5003
            FACT_CHECKER_URL: http://fact-checker:5004
            RAG_SERVICE_URL: http://rag-service:5005
        ports:
            - "${BIND_ADDR:-0.0.0.0}:5002:5002"
        depends_on:
            news-service:
                condition: service_started
            summarizer:
                condition: service_started
            fact-checker:
                condition: service_healthy
            rag-service:
                condition: service_started
        networks:
            - db_net
        restart: unless-stopped

    api-gateway:
        build: ./api-gateway
        environment:
            PORT: 8080
            NEWS_SERVICE_URL: http://news-service:5001
            SCRAPER_URL: http://scraper:5002
            SUMMARIZER_URL: http://summarizer:5003
            RAG_SERVICE_URL: http://rag-service:5005
        ports:
            - "${BIND_ADDR:-0.0.0.0}:8080:8080"
        depends_on:
            - news-service
            - scraper
            - summarizer
            - rag-service
        networks:
            - web_net
            - db_net
        restart: unless-stopped

    # Triggers a scrape on a timer from outside the scraper, so the scraper
    # itself never has to know about scheduling and can stay stateless.
    # Runs the same way in prod (single-VM deploy, #11) — no external
    # scheduling service needed.
    scheduler:
        image: curlimages/curl:latest
        environment:
            API: http://api-gateway:8080
            INTERVAL_SECONDS: 7200
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                sleep 30
                while true; do
                  echo "[scheduler] triggering scrape"
                  curl -sf -X POST "$$API/api/scrape" || echo "[scheduler] scrape request failed"
                  sleep "$$INTERVAL_SECONDS"
                done
        depends_on:
            - api-gateway
        networks:
            - db_net
        restart: unless-stopped

    frontend:
        build: ./frontend
        depends_on:
            - api-gateway
        ports:
            - "${BIND_ADDR:-0.0.0.0}:3000:80"
        networks:
            - web_net
        restart: unless-stopped

volumes:
    postgres_data:
    huggingface_cache:

networks:
    web_net:
    db_net:
