services:
    caddy:
        image: caddy:2-alpine
        environment:
            DOMAIN: ${DOMAIN}
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - frontend
        networks:
            - web_net
        restart: unless-stopped

volumes:
    caddy_data:
    caddy_config:
